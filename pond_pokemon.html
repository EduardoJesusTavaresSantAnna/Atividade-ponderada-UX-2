<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>D3 Pokémon Battle</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
body{background-color:#2c3e50;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:'Courier New',Courier,monospace;}
svg{background-color:#f0f0d8;box-shadow:0 10px 20px rgba(0,0,0,0.5);border-radius:4px;}
.box-bg{fill:#f8f8d8;stroke:#405048;stroke-width:6px;}
.menu-bg{fill:#f8f8f8;stroke:#505068;stroke-width:12px;}
.text-dark{fill:#303030;font-weight:bold;font-size:24px;}
.text-small{fill:#303030;font-size:24px;font-weight:bold;}
.hp-bar-bg{fill:#484048;}
.hp-bar-fill{fill:#48d0b0;}
.move-text{cursor:pointer;fill:#303030;font-weight:bold;font-size:36px;}
.move-text:hover{fill:#d04040;}
</style>
</head>
<body>
<div id="game-container"></div>
<script>
const battleData = {
  opponent: { name:"SQUIRTLE", level:26, hp:70, maxHp:100, sprite:"https://www.pngall.com/wp-content/uploads/15/Squirtle-PNG-Image-File.png" },
  player:   { name:"BULBASAUR", level:24, hp:52, maxHp:52, sprite:"https://art.pixilart.com/7e8988e96886ddd.png" },
  moves: ["VINE WHIP","RAZOR LEAF","GROWL","TACKLE"]
};

const width = 960, height = 640;
const svg = d3.select("#game-container").append("svg").attr("width", width).attr("height", height);
const sceneGroup = svg.append("g").attr("id", "scene");

const hpScaleOpponent = d3.scaleLinear().domain([0, battleData.opponent.maxHp]).range([0, 200]);
const hpScalePlayer   = d3.scaleLinear().domain([0, battleData.player.maxHp]).range([0, 200]);

sceneGroup.append("ellipse").attr("cx",700).attr("cy",240).attr("rx",180).attr("ry",50).attr("fill","#d0d0b8");
sceneGroup.append("ellipse").attr("cx",260).attr("cy",460).attr("rx",220).attr("ry",70).attr("fill","#d0d0b8");

const opponentImage = sceneGroup.append("image")
  .attr("href", battleData.opponent.sprite)
  .attr("x", 600).attr("y", 50).attr("width", 200).attr("height", 200);

const attackLayer = sceneGroup.append("g").attr("id","attack-layer");

sceneGroup.append("image")
  .attr("href", battleData.player.sprite)
  .attr("x", 70).attr("y", 230).attr("height", 250);

// Status Oponente
const oppStatus = svg.append("g").attr("transform","translate(40,60)");
oppStatus.append("rect").attr("class","box-bg").attr("width",360).attr("height",90);
oppStatus.append("text").attr("class","text-dark").attr("x",20).attr("y",40).text(battleData.opponent.name);
oppStatus.append("text").attr("class","text-dark").attr("x",260).attr("y",40).text("Lv"+battleData.opponent.level);
oppStatus.append("rect").attr("class","hp-bar-bg").attr("x",100).attr("y",56).attr("width",208).attr("height",16);
const opponentHpBar = oppStatus.append("rect").attr("class","hp-bar-fill").attr("x",104).attr("y",60).attr("width",hpScaleOpponent(battleData.opponent.hp)).attr("height",8);

// Status Jogador
const playerStatus = svg.append("g").attr("transform","translate(520,280)");
playerStatus.append("rect").attr("class","box-bg").attr("width",380).attr("height",130);
playerStatus.append("text").attr("class","text-dark").attr("x",20).attr("y",40).text(battleData.player.name);
playerStatus.append("text").attr("class","text-dark").attr("x",280).attr("y",40).text("Lv"+battleData.player.level);
playerStatus.append("rect").attr("class","hp-bar-bg").attr("x",120).attr("y",56).attr("width",208).attr("height",16);
playerStatus.append("rect").attr("class","hp-bar-fill").attr("x",124).attr("y",60).attr("width",hpScalePlayer(battleData.player.hp)).attr("height",8);
playerStatus.append("text").attr("class","text-small").attr("x",200).attr("y",100).text(`${battleData.player.hp} / ${battleData.player.maxHp}`);

// Menu Inferior
const menuY = 480;
svg.append("rect").attr("class","menu-bg").attr("x",10).attr("y",menuY).attr("width",600).attr("height",150);
svg.append("rect").attr("class","menu-bg").attr("x",620).attr("y",menuY).attr("width",330).attr("height",150);
svg.append("text").attr("class","text-dark").attr("x",650).attr("y",menuY+60).text("PP");
svg.append("text").attr("class","text-dark").attr("x",790).attr("y",menuY+60).text("25/25");
svg.append("text").attr("class","text-dark").attr("x",650).attr("y",menuY+120).text("TIPO/PLANTA");

const movePositions = [
  { x:60,  y:menuY+60  },
  { x:320, y:menuY+60  },
  { x:60,  y:menuY+120 },
  { x:320, y:menuY+120 }
];

let isBattling = false;

const cursorArrow = svg.append("polygon")
  .attr("points","0,0 24,12 0,24")
  .attr("fill","#303030")
  .style("opacity",0);

const zoomNormal = { tx:0,   ty:0,   s:1    };
const zoomIn     = { tx:-109,ty:-66, s:1.25 };

function animateSceneZoom(from, to, duration, ease) {
  const i = d3.interpolate(from, to);
  sceneGroup.transition("zoom").duration(duration).ease(ease)
    .attrTween("transform", () => t => {
      const v = i(t);
      return `translate(${v.tx},${v.ty}) scale(${v.s})`;
    });
}

function flashOpponent() {
  opponentImage
    .style("filter","drop-shadow(0 0 8px #ff0000) brightness(1.5)")
    .transition().duration(100).style("filter","drop-shadow(0 0 0px #ff0000) brightness(1)")
    .transition().duration(100).style("filter","drop-shadow(0 0 8px #ff0000) brightness(1.5)")
    .transition().duration(100).style("filter","drop-shadow(0 0 0px #ff0000) brightness(1)")
    .transition().duration(100).style("filter","drop-shadow(0 0 8px #ff0000) brightness(1.5)")
    .transition().duration(100).style("filter","none");
}

function applyDamage() {
  if (battleData.opponent.hp <= 0) return;
  const damage = Math.floor(Math.random() * 10) + 15;
  battleData.opponent.hp = Math.max(0, battleData.opponent.hp - damage);
  opponentHpBar.transition("width").duration(400).attr("width", hpScaleOpponent(battleData.opponent.hp));
  const hpPercent = battleData.opponent.hp / battleData.opponent.maxHp;
  const barColor = hpPercent < 0.2 ? "#e83030" : hpPercent < 0.5 ? "#f0b828" : "#48d0b0";
  opponentHpBar.transition("color").delay(100).duration(300).attr("fill", barColor);
}

// =========================================================
// VINE WHIP
// =========================================================
function vineWhipAttack() {
  if (isBattling || battleData.opponent.hp <= 0) return;
  isBattling = true;
  animateSceneZoom(zoomNormal, zoomIn, 400, d3.easeCubicOut);

  const startX = 215, startY = 330, endX = 700, endY = 170;

  function whipPath(t, retracting) {
    const tipX = retracting ? endX + (startX - endX) * t : startX + (endX - startX) * t;
    const tipY = retracting ? endY + (startY - endY) * t : startY + (endY - startY) * t;
    const arcHeight = (retracting ? 80 : 140) * Math.sin(t * Math.PI);
    const cp1x = startX + (tipX - startX) * 0.3;
    const cp1y = startY + (tipY - startY) * 0.3 - arcHeight * 1.2;
    const cp2x = startX + (tipX - startX) * 0.7;
    const cp2y = startY + (tipY - startY) * 0.7 - arcHeight * 0.5;
    return `M ${startX},${startY} C ${cp1x},${cp1y} ${cp2x},${cp2y} ${tipX},${tipY}`;
  }

  const vine = attackLayer.append("path")
    .attr("fill","none").attr("stroke","#3a8c28").attr("stroke-width",10)
    .attr("stroke-linecap","round").attr("filter","drop-shadow(0 0 4px #78c840)")
    .attr("d", whipPath(0, false));

  const vineInner = attackLayer.append("path")
    .attr("fill","none").attr("stroke","#78c840").attr("stroke-width",4)
    .attr("stroke-linecap","round").attr("d", whipPath(0, false));

  function onHit() { flashOpponent(); applyDamage(); }

  function cleanup() {
    if (!isBattling) return;
    vine.remove(); vineInner.remove();
    isBattling = false;
    animateSceneZoom(zoomIn, zoomNormal, 400, d3.easeCubicIn);
  }

  vine.transition().duration(480).ease(d3.easeLinear)
    .attrTween("d", () => t => whipPath(t, false))
    .transition().delay(200).duration(380).ease(d3.easeLinear)
    .attrTween("d", () => t => whipPath(t, true))
    .on("end", cleanup).on("interrupt", cleanup);

  vineInner.transition().duration(480).ease(d3.easeLinear)
    .attrTween("d", () => t => whipPath(t, false))
    .on("end", onHit)
    .transition().delay(200).duration(380).ease(d3.easeLinear)
    .attrTween("d", () => t => whipPath(t, true))
    .on("end", cleanup).on("interrupt", cleanup);
}

// =========================================================
// RAZOR LEAF
// =========================================================
const leafConfigs = [
  { angle:-30, delay:0,   color:"#4cb84c", spin: 160 },
  { angle:-18, delay:80,  color:"#3da03d", spin:-175 },
  { angle: -6, delay:160, color:"#58cc58", spin: 150 },
  { angle:  6, delay:70,  color:"#48b848", spin:-160 },
  { angle: 18, delay:120, color:"#3da03d", spin: 170 },
  { angle: 28, delay:40,  color:"#4cb84c", spin:-165 },
  { angle:-10, delay:200, color:"#58cc58", spin: 145 },
  { angle: 10, delay:220, color:"#48b848", spin:-155 },
];

function criarFolha(g, color) {
  g.append("ellipse").attr("rx",22).attr("ry",10)
    .attr("fill",color).attr("stroke",d3.color(color).darker(0.8)).attr("stroke-width",1.2);
  g.append("line").attr("x1",-20).attr("y1",0).attr("x2",20).attr("y2",0)
    .attr("stroke",d3.color(color).darker(1)).attr("stroke-width",1.2);
  [[-10,-6],[-3,-8],[5,-6]].forEach(([x,y]) => {
    g.append("line").attr("x1",x).attr("y1",0).attr("x2",x+5).attr("y2",y)
      .attr("stroke",d3.color(color).darker(0.8)).attr("stroke-width",0.9);
    g.append("line").attr("x1",x).attr("y1",0).attr("x2",x+5).attr("y2",-y)
      .attr("stroke",d3.color(color).darker(0.8)).attr("stroke-width",0.9);
  });
}

function razorLeafAttack() {
  if (isBattling || battleData.opponent.hp <= 0) return;
  isBattling = true;
  animateSceneZoom(zoomNormal, zoomIn, 400, d3.easeCubicOut);

  const leavesG = attackLayer.append("g").attr("id","leaves");
  const xStart = 360, yStart = 290, xEnd = 680, yEnd = 130;
  const maxDelay = Math.max(...leafConfigs.map(c => c.delay));

  leafConfigs.forEach(cfg => {
    setTimeout(() => {
      const g = leavesG.append("g");
      criarFolha(g, cfg.color);
      const initRot = Math.random() * 60 - 30;
      g.attr("transform", `translate(${xStart},${yStart}) rotate(${initRot})`).attr("opacity", 0);
      const tx = xEnd + (Math.random() * 30 - 15);
      const ty = yEnd + (Math.random() * 20 - 10);
      const dur = 700 + Math.random() * 100;

      g.transition().duration(100).attr("opacity", 1)
        .transition().duration(dur).ease(d3.easeLinear)
        .tween("leafFly", function() {
          const ix = d3.interpolate(xStart, tx);
          const iy = d3.interpolate(yStart, ty);
          const ir = d3.interpolate(initRot, initRot + cfg.spin);
          return function(t) {
            d3.select(this).attr("transform", `translate(${ix(t)},${iy(t)}) rotate(${ir(t)})`);
          };
        })
        .transition().duration(150).attr("opacity", 0)
        .on("end", function() { d3.select(this).remove(); });
    }, cfg.delay);
  });

  setTimeout(() => { flashOpponent(); applyDamage(); }, 900);

  setTimeout(() => {
    leavesG.remove();
    isBattling = false;
    animateSceneZoom(zoomIn, zoomNormal, 400, d3.easeCubicIn);
  }, maxDelay + 950);
}

// =========================================================
// MENU — GOLPES
// =========================================================
svg.selectAll(".move-text")
  .data(battleData.moves).enter().append("text")
  .attr("class","move-text")
  .attr("x", (d,i) => movePositions[i].x)
  .attr("y", (d,i) => movePositions[i].y)
  .text(d => d)
  .on("mouseover", function(event, d) {
    const i = battleData.moves.indexOf(d);
    cursorArrow
      .attr("transform", `translate(${movePositions[i].x - 40},${movePositions[i].y - 24})`)
      .style("opacity", 1);
  })
  .on("mouseout", function() { cursorArrow.style("opacity", 0); })
  .on("click", function(event, d) {
    if      (d === "VINE WHIP")  vineWhipAttack();
    else if (d === "RAZOR LEAF") razorLeafAttack();
    else if (!isBattling)        flashOpponent();
  });
</script>
</body>
</html>
